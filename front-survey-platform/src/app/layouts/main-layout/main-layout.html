<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="'navigation'"
      [mode]="'side'"
      [opened]="true">
    <mat-toolbar color="primary">
      <span>Menú</span>
    </mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/surveys" routerLinkActive="active">
        <mat-icon matListItemIcon>assignment</mat-icon>
        <span>Encuestas</span>
      </a>
      <a mat-list-item routerLink="/analytics" routerLinkActive="active">
        <mat-icon matListItemIcon>bar_chart</mat-icon>
        <span>Analítica</span>
      </a>
      <a mat-list-item routerLink="/public/surveys" routerLinkActive="active">
        <mat-icon matListItemIcon>public</mat-icon>
        <span>Vista Pública</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <span>SaaS de Encuestas</span>
      <span class="toolbar-spacer"></span>
      <button mat-icon-button>
        <mat-icon>account_circle</mat-icon>
      </button>
    </mat-toolbar>
    
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
